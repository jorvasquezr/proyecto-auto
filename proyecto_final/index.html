<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Verificador LTL — Autómatas de Büchi</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1e1e2e; --panel: #24273a; --border: #363a4f;
  --blue: #89b4fa; --green: #a6e3a1; --red: #f38ba8; --yellow: #f9e2af;
  --orange: #fab387; --gray: #585b70; --white: #cdd6f4; --sub: #a6adc8; --purple: #cba6f7;
}
html, body { height: 100%; background: var(--bg); color: var(--white); font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
body { display: flex; flex-direction: column; }

/* ── deck + slides ─────────────────────────────────────────────── */
#deck { flex: 1; position: relative; overflow: hidden; min-height: 0; }

/* Outer slide container — one rule controls visibility */
.slide {
  position: absolute; inset: 0; display: flex;
  opacity: 0; pointer-events: none;
  transition: opacity .4s ease;
}
.slide.active { opacity: 1; pointer-events: auto; }

/* ── nav footer ────────────────────────────────────────────────── */
footer {
  background: var(--panel); border-top: 1px solid var(--border);
  padding: 10px 28px; display: flex; align-items: center; gap: 16px; flex-shrink: 0;
}
.nav-btn {
  width: 38px; height: 34px; border-radius: 7px; border: 1px solid var(--border);
  background: transparent; color: var(--white); cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center; transition: all .15s;
}
.nav-btn:hover:not(:disabled) { border-color: var(--blue); color: var(--blue); }
.nav-btn:disabled { opacity: .3; cursor: default; }
#prog-wrap { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
#prog-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width .4s ease; }
#slide-label { font-size: .78rem; color: var(--sub); min-width: 130px; text-align: center; }
#slide-count { font-size: .75rem; color: var(--gray); font-family: monospace; }

/* ═══════════════════════════════════════════════════════════════════
   SLIDE LAYOUTS
═══════════════════════════════════════════════════════════════════ */

/* ── Title ──────────────────────────────────────────────────────── */
.s-title {
  flex-direction: column; align-items: center; justify-content: center;
  background: var(--bg); position: relative; overflow: hidden;
}
.s-title::before {
  content: ''; position: absolute; inset: 0;
  background-image: radial-gradient(circle at 1px 1px, rgba(137,180,250,.13) 1px, transparent 0);
  background-size: 30px 30px; pointer-events: none;
}
.title-inner {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center; gap: 22px;
  max-width: 680px; padding: 40px; text-align: center;
}
.title-badge {
  font-size: .68rem; letter-spacing: .14em; text-transform: uppercase;
  color: var(--sub); border: 1px solid var(--border); padding: 5px 16px; border-radius: 20px;
}
.title-h1 { font-size: clamp(1.9rem, 4vw, 3rem); font-weight: 800; line-height: 1.15; }
.title-h1 span { color: var(--blue); }
.title-formula {
  font-family: 'Courier New', monospace; font-size: clamp(.88rem, 1.5vw, 1.1rem);
  color: var(--yellow); background: rgba(249,226,175,.08);
  border: 1px solid rgba(249,226,175,.22); padding: 12px 24px; border-radius: 8px;
}
.title-chips { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.chip { font-size: .72rem; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); color: var(--sub); }
.title-meta { font-size: .78rem; color: var(--gray); }

/* ── Concept (2-column) ─────────────────────────────────────────── */
.s-concept { background: var(--bg); }
.concept-grid { display: grid; grid-template-columns: 1fr 1fr; width: 100%; height: 100%; }
.col { padding: 48px 52px; display: flex; flex-direction: column; justify-content: center; gap: 22px; overflow-y: auto; }
.col-right { border-left: 1px solid var(--border); }
.c-tag { font-size: .65rem; text-transform: uppercase; letter-spacing: .12em; color: var(--blue); font-weight: 600; }
.c-h2 { font-size: clamp(1.4rem, 2.4vw, 2rem); font-weight: 700; line-height: 1.2; }
.c-body { font-size: .88rem; color: var(--sub); line-height: 1.72; }
.c-body strong { color: var(--white); }
.c-body code { font-family: monospace; font-size: .84rem; color: var(--yellow); background: rgba(249,226,175,.1); padding: 1px 5px; border-radius: 3px; }

.bullet-list { display: flex; flex-direction: column; gap: 14px; }
.bullet { display: flex; align-items: flex-start; gap: 12px; }
.b-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: .85rem; flex-shrink: 0; }
.b-text { font-size: .86rem; color: var(--sub); line-height: 1.6; padding-top: 3px; }
.b-text strong { color: var(--white); }

.big-fbox {
  background: rgba(137,180,250,.07); border: 1px solid rgba(137,180,250,.2);
  border-radius: 14px; padding: 32px; text-align: center; display: flex; flex-direction: column; gap: 14px;
}
.big-fbox .bf-label { font-size: .65rem; text-transform: uppercase; letter-spacing: .12em; color: var(--sub); }
.big-fbox .bf-formula { font-family: 'Courier New', monospace; font-size: clamp(1.1rem, 2vw, 1.5rem); color: var(--yellow); }
.big-fbox .bf-explain { font-size: .82rem; color: var(--sub); line-height: 1.65; }
.big-fbox .bf-explain em { color: var(--white); font-style: normal; font-weight: 600; }

.op-list { display: flex; flex-direction: column; gap: 14px; }
.op-row { display: flex; align-items: flex-start; gap: 16px; }
.op-sym { font-family: 'Courier New', monospace; font-size: 1rem; color: var(--blue); min-width: 88px; font-weight: 700; flex-shrink: 0; }
.op-text { font-size: .84rem; color: var(--sub); line-height: 1.55; }
.op-text em { color: var(--white); font-style: normal; font-weight: 600; }

.info-pill { background: var(--panel); border-radius: 8px; padding: 12px 14px; display: flex; flex-direction: column; gap: 4px; }
.ip-label { font-size: .63rem; text-transform: uppercase; letter-spacing: .08em; color: var(--gray); }
.ip-val { font-family: 'Courier New', monospace; font-size: .9rem; color: var(--yellow); }
.ip-sub { font-size: .75rem; color: var(--sub); }

/* ── Pipeline slide ─────────────────────────────────────────────── */
.s-pipeline {
  flex-direction: column; align-items: center; justify-content: center;
  background: var(--bg); padding: 40px;
}
.pip-wrap { max-width: 960px; width: 100%; display: flex; flex-direction: column; gap: 36px; }
.pip-title-wrap { text-align: center; display: flex; flex-direction: column; gap: 8px; }
.pip-flow { display: flex; align-items: center; gap: 0; width: 100%; }
.pip-box { flex: 1; }
.pip-inner {
  margin: 0 5px; border: 1.5px solid; border-radius: 10px;
  padding: 16px 10px; text-align: center; display: flex; flex-direction: column; gap: 8px;
}
.pip-icon { font-size: 1.6rem; }
.pip-name { font-size: .82rem; font-weight: 700; }
.pip-sub { font-size: .68rem; color: var(--sub); line-height: 1.4; }
.pip-arrow { font-size: 1.5rem; color: var(--gray); flex-shrink: 0; padding: 0 2px; }
.pip-results { display: flex; justify-content: center; gap: 32px; flex-wrap: wrap; }
.pip-res { display: flex; align-items: center; gap: 10px; font-size: .85rem; color: var(--sub); }
.pip-res code { font-family: monospace; color: var(--orange); font-size: .82rem; }

/* ── Split slides ───────────────────────────────────────────────── */
.s-split { flex-direction: row; background: var(--bg); }
.sp-left {
  width: 310px; flex-shrink: 0; background: var(--panel); border-right: 1px solid var(--border);
  padding: 36px 28px; display: flex; flex-direction: column; justify-content: center; gap: 18px;
  overflow-y: auto;
}
.sp-tag { font-size: .62rem; text-transform: uppercase; letter-spacing: .12em; color: var(--blue); font-weight: 600; }
.sp-h2 { font-size: 1.15rem; font-weight: 700; line-height: 1.3; }
.sp-body { font-size: .8rem; color: var(--sub); line-height: 1.68; }
.sp-body code { font-family: monospace; font-size: .77rem; color: var(--yellow); background: rgba(249,226,175,.1); padding: 1px 5px; border-radius: 3px; }
.sp-body strong { color: var(--white); }
.sp-note { background: var(--bg); border-radius: 7px; padding: 9px 12px; font-size: .73rem; color: var(--sub); }
.sp-note code { font-family: monospace; color: var(--yellow); }
.sp-right { flex: 1; display: flex; align-items: center; justify-content: center; padding: 16px; min-width: 0; }
.sp-right svg { width: 100%; height: 100%; }

/* ── Result slides ──────────────────────────────────────────────── */
.s-result { flex-direction: column; align-items: center; justify-content: center; gap: 28px; background: var(--bg); padding: 40px; }
.rb-big { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 30px 56px; border-radius: 18px; border: 2px solid; }
.rb-big.ok  { background: rgba(29,58,42,.6);  border-color: var(--green); }
.rb-big.fail{ background: rgba(58,29,40,.6);  border-color: var(--red); }
.rb-icon  { font-size: 2.6rem; }
.rb-title { font-size: 1.8rem; font-weight: 800; letter-spacing: .02em; }
.rb-sub   { font-family: monospace; font-size: .9rem; opacity: .7; }
.r-detail { max-width: 560px; text-align: center; font-size: .87rem; color: var(--sub); line-height: 1.72; display: flex; flex-direction: column; gap: 14px; }
.r-formula { font-family: monospace; font-size: 1rem; color: var(--yellow); }
.ce-box { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px 22px; text-align: left; display: flex; flex-direction: column; gap: 6px; }
.ce-lbl  { font-size: .63rem; text-transform: uppercase; letter-spacing: .1em; color: var(--gray); }
.ce-pref { font-family: monospace; font-size: .82rem; color: var(--orange); }
.ce-cyc  { font-family: monospace; font-size: .82rem; color: var(--red); }
</style>
</head>
<body>

<div id="deck"><!-- slides injected by JS --></div>

<footer>
  <button class="nav-btn" id="btn-prev" onclick="go(cur-1)" disabled>←</button>
  <div id="prog-wrap"><div id="prog-fill" style="width:0%"></div></div>
  <span id="slide-label"></span>
  <span id="slide-count"></span>
  <button class="nav-btn" id="btn-next" onclick="go(cur+1)">→</button>
</footer>

<script>
/* ══════════════════════════════════════════════════════════════════
   DATA
══════════════════════════════════════════════════════════════════ */
const EX = [
  { name:'Semáforo', phi:'G F verde', neg:'F(G(!verde))',
    kripke:{
      states:['rojo','verde','amarillo'], initial:'rojo',
      trans:[{f:'rojo',t:'verde'},{f:'verde',t:'amarillo'},{f:'amarillo',t:'rojo'}],
      labels:{rojo:['rojo'],verde:['verde'],amarillo:['amarillo']}
    },
    buchi:{ n:2, init:0,
      trans:[{f:0,g:'!verde',t:1},{f:0,g:'T',t:0},{f:1,g:'!verde',t:1}],
      acc:[1]
    },
    product:{
      states:[{k:'rojo',b:0},{k:'verde',b:1},{k:'verde',b:0},{k:'amarillo',b:0},{k:'rojo',b:1}],
      init:[0],
      trans:[{f:0,t:1},{f:3,t:4},{f:3,t:0},{f:2,t:3},{f:0,t:2},{f:4,t:1}],
      acc:[1,4]
    },
    result:true, ce:null
  },
  { name:'Protocolo con Bug', phi:'G F grant', neg:'F(G(!grant))',
    kripke:{
      states:['idle','request','grant','deny'], initial:'idle',
      trans:[{f:'idle',t:'request'},{f:'request',t:'grant'},{f:'request',t:'deny'},{f:'grant',t:'idle'},{f:'deny',t:'request'}],
      labels:{idle:[],request:['request'],grant:['grant'],deny:['deny']}
    },
    buchi:{ n:2, init:0,
      trans:[{f:0,g:'!grant',t:1},{f:0,g:'T',t:0},{f:1,g:'!grant',t:1}],
      acc:[1]
    },
    product:{
      states:[{k:'idle',b:0},{k:'request',b:1},{k:'request',b:0},{k:'grant',b:1},{k:'deny',b:1},{k:'grant',b:0},{k:'deny',b:0}],
      init:[0],
      trans:[{f:0,t:1},{f:2,t:4},{f:6,t:2},{f:4,t:1},{f:6,t:1},{f:1,t:4},{f:2,t:3},{f:0,t:2},{f:2,t:6},{f:5,t:0},{f:2,t:5},{f:1,t:3}],
      acc:[1,3,4]
    },
    result:false,
    ce:{
      prefix:[{k:'idle',b:0},{k:'request',b:1},{k:'deny',b:1}],
      cycle:[{k:'deny',b:1},{k:'request',b:1},{k:'deny',b:1}]
    }
  }
];

/* ══════════════════════════════════════════════════════════════════
   SVG / GRAPH HELPERS
══════════════════════════════════════════════════════════════════ */
const C = { blue:'#89b4fa', green:'#a6e3a1', red:'#f38ba8', yellow:'#f9e2af', orange:'#fab387', gray:'#8890a6', bg:'#1e1e2e', white:'#cdd6f4', sub:'#a6adc8' };

function mkDefs(svg) {
  svg.selectAll('defs').remove();
  const d = svg.append('defs');
  [['arr',C.gray],['arr-g',C.green],['arr-o',C.orange],['arr-r',C.red],['arr-b',C.blue]].forEach(([id,col]) => {
    d.append('marker').attr('id',id).attr('viewBox','0 -5 10 10').attr('refX',9).attr('refY',0)
      .attr('markerWidth',8).attr('markerHeight',8).attr('orient','auto')
      .append('path').attr('d','M0,-5L10,0L0,5Z').attr('fill',col);
  });
}

function epath(x1,y1,x2,y2,curv,R,self) {
  const GAP = R + 9;
  if (self) return `M${x1-14},${y1-R} C${x1-44},${y1-R-65} ${x1+44},${y1-R-65} ${x1+14},${y1-R}`;
  const dx=x2-x1, dy=y2-y1, dist=Math.hypot(dx,dy)||1;
  if (curv === 0) return `M${x1+dx/dist*R},${y1+dy/dist*R} L${x2-dx/dist*GAP},${y2-dy/dist*GAP}`;
  const nx=-dy/dist, ny=dx/dist;
  const mx=(x1+x2)/2+nx*curv, my=(y1+y2)/2+ny*curv;
  const ds=Math.hypot(mx-x1,my-y1)||1, de=Math.hypot(mx-x2,my-y2)||1;
  return `M${x1+(mx-x1)/ds*R},${y1+(my-y1)/ds*R} Q${mx},${my} ${x2+(mx-x2)/de*GAP},${y2+(my-y2)/de*GAP}`;
}

function animP(sel, delay, dur=400) {
  sel.each(function() {
    const el = d3.select(this);
    let l; try { l = this.getTotalLength(); } catch(e) { return; }
    el.attr('stroke-dasharray',l).attr('stroke-dashoffset',l)
      .transition().delay(delay).duration(dur).ease(d3.easeCubicOut).attr('stroke-dashoffset',0);
  });
}

function circPos(n,cx,cy,r) {
  return Array.from({length:n}, (_,i) => ({ x: cx+r*Math.cos(2*Math.PI*i/n-Math.PI/2), y: cy+r*Math.sin(2*Math.PI*i/n-Math.PI/2) }));
}

function forcePos(nodes,links,cx,cy) {
  const ns = nodes.map((n,i) => ({id:i,...n}));
  const ls = links.map(l => ({source:l.f, target:l.t}));
  const sim = d3.forceSimulation(ns)
    .force('link', d3.forceLink(ls).id(d=>d.id).distance(90).strength(.9))
    .force('charge', d3.forceManyBody().strength(-300))
    .force('center', d3.forceCenter(cx,cy))
    .force('collide', d3.forceCollide(48))
    .stop();
  for (let i=0; i<900; i++) sim.tick();
  return ns.map(n => ({x:n.x, y:n.y}));
}

const ABBR = {idle_idle:'ii',req_idle:'ri',crit_idle:'ci',idle_req:'ir',req_req:'rr',idle_crit:'ic'};
function ab(s) { return ABBR[s]||s; }

function drawGraph(svg, pos, nodes, edges, nodeR, nodeFill, nodeLabel, accSet, initIdx, edgeColor, edgeMarker, edgeLabel, anim) {
  const g = svg.append('g');
  // edge pass/idx tracking for parallel edges
  const pCnt={}, pIdx={};
  edges.forEach(e => { const k=`${e.f}-${e.t}`; pCnt[k]=(pCnt[k]||0)+1; });
  edges.forEach(e => { const k=`${e.f}-${e.t}`; pIdx[k]=pIdx[k]||0; });

  // draw edges
  edges.forEach((e,ei) => {
    const k=`${e.f}-${e.t}`, rk=`${e.t}-${e.f}`;
    const idx=pIdx[k]++, hasRev=(pCnt[rk]||0)>0;
    const curv = hasRev ? 38 : (pCnt[k]>1 ? 28*(idx-(pCnt[k]-1)/2) : 0);
    const x1=pos[e.f].x, y1=pos[e.f].y, x2=pos[e.t].x, y2=pos[e.t].y;
    const path = g.append('path')
      .attr('d', epath(x1,y1,x2,y2,curv,nodeR,e.f===e.t))
      .attr('fill','none').attr('stroke', edgeColor(e)).attr('stroke-width',2)
      .attr('marker-end',`url(#${edgeMarker(e)})`);
    if (anim) animP(path, ei*20, 320);

    const lbl = edgeLabel(e);
    if (lbl) {
      const isSelf = e.f===e.t;
      const lx = isSelf ? x1 : (x1+x2)/2+(-(y2-y1)/Math.hypot(x2-x1,y2-y1)||0)*(hasRev?40:22);
      const ly = isSelf ? y1-nodeR-46 : (y1+y2)/2+((x2-x1)/Math.hypot(x2-x1,y2-y1)||0)*(hasRev?40:22)-(hasRev?22:0);
      const lt = g.append('text').attr('x',lx).attr('y',ly).attr('text-anchor','middle')
        .attr('fill',C.sub).attr('font-size',10).attr('font-family','Courier New').text(lbl);
      if (anim) lt.attr('opacity',0).transition().delay(ei*20+320).duration(200).attr('opacity',1);
    }
  });

  const nd = edges.length*20;
  // acceptance rings
  nodes.forEach((_,i) => {
    if (!accSet.has(i)) return;
    const {x,y} = pos[i];
    const ring = g.append('circle').attr('cx',x).attr('cy',y).attr('r',nodeR+9)
      .attr('fill','none').attr('stroke',C.yellow).attr('stroke-width',2.5).attr('stroke-dasharray','7 3');
    if (anim) ring.attr('opacity',0).transition().delay(nd+i*50).duration(300).attr('opacity',1);
  });

  // node circles + labels
  nodes.forEach((_,i) => {
    const {x,y} = pos[i], d = nd+i*50;
    const col = nodeFill(i);
    const c = g.append('circle').attr('cx',x).attr('cy',y).attr('fill',col).attr('stroke','#13131e').attr('stroke-width',2.5);
    if (anim) {
      c.attr('r',0).attr('opacity',0).transition().delay(d).duration(300).ease(d3.easeBackOut.overshoot(1.4)).attr('r',nodeR).attr('opacity',1);
    } else { c.attr('r',nodeR); }

    const lbl = nodeLabel(i), lines = lbl.split('\n');
    lines.forEach((ln,li) => {
      const t = g.append('text')
        .attr('x',x).attr('y', y+(li-(lines.length-1)/2)*13+1)
        .attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('fill','#13131e')
        .attr('font-size', lbl.replace('\n','').length>10?7 : lbl.replace('\n','').length>6?9:11)
        .attr('font-family','Courier New').attr('font-weight','bold').text(ln);
      if (anim) t.attr('opacity',0).transition().delay(d+220).duration(200).attr('opacity',1);
    });
  });

  // initial arrow
  if (initIdx >= 0) {
    const {x,y} = pos[initIdx], ang = -Math.PI*.72, D = nodeR+28;
    const arr = g.append('line')
      .attr('x1',x+Math.cos(ang)*D).attr('y1',y+Math.sin(ang)*D)
      .attr('x2',x+Math.cos(ang)*(nodeR+5)).attr('y2',y+Math.sin(ang)*(nodeR+5))
      .attr('stroke',C.green).attr('stroke-width',2.5).attr('marker-end','url(#arr-g)');
    if (anim) arr.attr('opacity',0).transition().delay(nd).duration(300).attr('opacity',1);
  }
  return g;
}

/* ══════════════════════════════════════════════════════════════════
   SLIDE RENDERERS
══════════════════════════════════════════════════════════════════ */
function getSVGSize(svgEl) {
  const bb = svgEl.getBoundingClientRect();
  return { W: bb.width || 600, H: bb.height || 400 };
}

function renderKripke(svgEl, ex, hiStates=new Set()) {
  const svg = d3.select(svgEl);
  const {W,H} = getSVGSize(svgEl);
  svg.attr('viewBox',`0 0 ${W} ${H}`).selectAll('*').remove(); mkDefs(svg);
  const k = ex.kripke, n = k.states.length;
  const r = Math.min(W,H) * (n<=3?.29:.32);
  const nodeR = Math.min(W,H) * .082;
  const pos = circPos(n, W/2, H/2-10, r);
  const trans = k.trans.map(t => ({f:k.states.indexOf(t.f), t:k.states.indexOf(t.t)}));
  drawGraph(svg, pos, k.states, trans, nodeR,
    i => hiStates.has(k.states[i]) ? C.red : (k.states[i]===k.initial ? C.green : C.blue),
    i => { const lb=k.labels[k.states[i]]||[]; return ab(k.states[i])+(lb.length?'\n{'+lb.join(',')+'}':''); },
    new Set(), k.states.indexOf(k.initial),
    ()=>C.gray, ()=>'arr', ()=>'', true);
  svg.append('text').attr('x',12).attr('y',H-12).attr('fill',C.sub).attr('font-size',11)
    .attr('opacity',0).text(`M: ${n} estados · ${k.trans.length} transiciones`)
    .transition().delay(800).duration(400).attr('opacity',1);
}

function renderBuchi(svgEl, ex) {
  const svg = d3.select(svgEl);
  const {W,H} = getSVGSize(svgEl);
  svg.attr('viewBox',`0 0 ${W} ${H}`).selectAll('*').remove(); mkDefs(svg);
  const b = ex.buchi, n = b.n;
  const nodeR = Math.min(W,H) * .11;
  const pos = n===2 ? [{x:W*.28,y:H/2},{x:W*.72,y:H/2}] : circPos(n,W/2,H/2,Math.min(W,H)*.28);
  const trans = b.trans.map(t => ({f:t.f, t:t.t, g:t.g}));
  drawGraph(svg, pos, Array.from({length:n}), trans, nodeR,
    i => b.acc.includes(i) ? C.yellow : C.blue,
    i => `q${i}`, new Set(b.acc), b.init,
    ()=>C.gray, ()=>'arr', e=>e.g, true);
  svg.append('text').attr('x',12).attr('y',H-12).attr('fill',C.sub).attr('font-size',11)
    .attr('opacity',0).text(`A(¬φ): ${n} estados · ⊙ = aceptación Büchi`)
    .transition().delay(900).duration(400).attr('opacity',1);
}

let _prodPos = {};
function renderProduct(svgEl, ex, showDFS=false) {
  const svg = d3.select(svgEl);
  const {W,H} = getSVGSize(svgEl);
  svg.attr('viewBox',`0 0 ${W} ${H}`).selectAll('*').remove(); mkDefs(svg);
  const p = ex.product, n = p.states.length;
  const nodeR = 32;

  if (!_prodPos[ex.name] || showDFS) {
    _prodPos[ex.name] = n<=5 ? circPos(n,W/2,H/2,Math.min(W,H)*.32) : forcePos(p.states,p.trans,W/2,H/2-10);
  }
  const pos = _prodPos[ex.name];

  drawGraph(svg, pos, p.states, p.trans, nodeR,
    i => p.acc.includes(i) ? C.yellow : C.blue,
    i => ab(p.states[i].k)+'\nq'+p.states[i].b,
    new Set(p.acc), p.init[0],
    ()=>C.gray, ()=>'arr', ()=>'', true);

  const baseDelay = p.trans.length*20 + p.states.length*50 + 400;

  if (showDFS && ex.ce) {
    const toEdges = list => list.slice(0,-1).map((s,i) => {
      const a=p.states.findIndex(x=>x.k===list[i].k&&x.b===list[i].b);
      const b=p.states.findIndex(x=>x.k===list[i+1].k&&x.b===list[i+1].b);
      return {f:a,t:b};
    }).filter(e=>e.f>=0&&e.t>=0);

    const pEdges = toEdges(ex.ce.prefix);
    const cEdges = toEdges(ex.ce.cycle);
    const STEP = 380;

    // prefix (orange)
    setTimeout(()=>{
      const og = svg.append('g');
      pEdges.forEach((e,i) => {
        const path = og.append('path')
          .attr('d', epath(pos[e.f].x,pos[e.f].y,pos[e.t].x,pos[e.t].y,0,nodeR+3,e.f===e.t))
          .attr('fill','none').attr('stroke',C.orange).attr('stroke-width',4)
          .attr('marker-end','url(#arr-o)');
        animP(path, i*STEP, 400);
      });
    }, baseDelay);

    const cycleStart = baseDelay + pEdges.length*STEP + 300;

    // cycle (red)
    setTimeout(()=>{
      const rg = svg.append('g');
      cEdges.forEach((e,i) => {
        const path = rg.append('path')
          .attr('d', epath(pos[e.f].x,pos[e.f].y,pos[e.t].x,pos[e.t].y,0,nodeR+3,e.f===e.t))
          .attr('fill','none').attr('stroke',C.red).attr('stroke-width',4)
          .attr('marker-end','url(#arr-r)');
        animP(path, i*STEP, 400);
      });
    }, cycleStart);

    // recolor prefix nodes orange
    const prefIdx = ex.ce.prefix.map(s=>p.states.findIndex(x=>x.k===s.k&&x.b===s.b));
    setTimeout(()=>{
      const hg=svg.append('g');
      prefIdx.forEach((i,j) => {
        hg.append('circle').attr('cx',pos[i].x).attr('cy',pos[i].y).attr('r',nodeR)
          .attr('fill',C.orange).attr('stroke','#13131e').attr('stroke-width',2.5)
          .attr('opacity',0).transition().delay(j*80).duration(280).attr('opacity',1);
        // re-draw label on top
        const lbl=ab(p.states[i].k)+'\nq'+p.states[i].b, lines=lbl.split('\n');
        lines.forEach((ln,li)=>{
          hg.append('text').attr('x',pos[i].x).attr('y',pos[i].y+(li-(lines.length-1)/2)*13+1)
            .attr('text-anchor','middle').attr('dominant-baseline','middle')
            .attr('fill','#13131e').attr('font-size',9).attr('font-family','Courier New').attr('font-weight','bold').text(ln)
            .attr('opacity',0).transition().delay(j*80+200).duration(200).attr('opacity',1);
        });
      });
    }, baseDelay + pEdges.length*STEP + 100);

    // recolor cycle nodes red
    const cycIdx = ex.ce.cycle.map(s=>p.states.findIndex(x=>x.k===s.k&&x.b===s.b));
    setTimeout(()=>{
      const hg=svg.append('g');
      cycIdx.forEach((i,j) => {
        hg.append('circle').attr('cx',pos[i].x).attr('cy',pos[i].y).attr('r',nodeR)
          .attr('fill',C.red).attr('stroke','#13131e').attr('stroke-width',2.5)
          .attr('opacity',0).transition().delay(j*80).duration(280).attr('opacity',1);
        const lbl=ab(p.states[i].k)+'\nq'+p.states[i].b, lines=lbl.split('\n');
        lines.forEach((ln,li)=>{
          hg.append('text').attr('x',pos[i].x).attr('y',pos[i].y+(li-(lines.length-1)/2)*13+1)
            .attr('text-anchor','middle').attr('dominant-baseline','middle')
            .attr('fill','#13131e').attr('font-size',9).attr('font-family','Courier New').attr('font-weight','bold').text(ln)
            .attr('opacity',0).transition().delay(j*80+200).duration(200).attr('opacity',1);
        });
      });
    }, cycleStart + cEdges.length*STEP + 100);
  }

  svg.append('text').attr('x',12).attr('y',H-12).attr('fill',C.sub).attr('font-size',11)
    .attr('opacity',0).text(`M×A: ${n} estados · ${p.acc.length} aceptantes`)
    .transition().delay(1000).duration(400).attr('opacity',1);
}

/* ══════════════════════════════════════════════════════════════════
   INIT & NAVIGATION
══════════════════════════════════════════════════════════════════ */
let cur = 0;
const deck = document.getElementById('deck');

// Inject slides
SLIDES.forEach((s,i) => {
  const el = document.createElement('div');
  el.className = `slide ${s.type}`;
  el.id = `slide-${i}`;
  el.innerHTML = s.html;
  deck.appendChild(el);
});

function go(n) {
  if (n < 0 || n >= SLIDES.length) return;
  document.getElementById(`slide-${cur}`).classList.remove('active');
  cur = n;
  const el = document.getElementById(`slide-${cur}`);
  el.classList.add('active');
  const s = SLIDES[cur];
  if (s.onEnter && (!s._rendered || s.alwaysRender)) {
    s._rendered = true;
    // wait two frames so the element is painted and has its layout size
    requestAnimationFrame(() => requestAnimationFrame(() => s.onEnter(el)));
  }
  updateNav();
}

function updateNav() {
  const pct = (cur / (SLIDES.length-1) * 100).toFixed(1);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('slide-label').textContent = SLIDES[cur].label;
  document.getElementById('slide-count').textContent = `${cur+1} / ${SLIDES.length}`;
  document.getElementById('btn-prev').disabled = cur === 0;
  document.getElementById('btn-next').disabled = cur === SLIDES.length-1;
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(cur+1); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); go(cur-1); }
});

go(0);
</script>
