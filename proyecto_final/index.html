<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Verificador LTL — Autómatas de Büchi</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1e1e2e; --panel: #24273a; --border: #363a4f;
  --blue: #89b4fa; --green: #a6e3a1; --red: #f38ba8; --yellow: #f9e2af;
  --orange: #fab387; --gray: #585b70; --white: #cdd6f4; --sub: #a6adc8; --purple: #cba6f7;
}
body { background: var(--bg); color: var(--white); font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 20px; flex-shrink: 0; }
header h1 { font-size: 1.1rem; font-weight: 600; color: var(--white); letter-spacing: .03em; }
header .sub { font-size: .8rem; color: var(--sub); }
.example-tabs { display: flex; gap: 6px; margin-left: auto; }
.example-tab { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--sub); cursor: pointer; font-size: .85rem; transition: all .2s; }
.example-tab.active { background: var(--blue); color: var(--bg); border-color: var(--blue); font-weight: 600; }
.example-tab:hover:not(.active) { border-color: var(--blue); color: var(--blue); }
#main { flex: 1; display: grid; grid-template-columns: 300px 1fr; overflow: hidden; }
#sidebar { background: var(--panel); border-right: 1px solid var(--border); padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
.info-block { background: var(--bg); border-radius: 8px; padding: 12px 14px; }
.info-block .label { font-size: .7rem; color: var(--sub); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
.formula { font-family: 'Courier New', monospace; font-size: 1rem; color: var(--yellow); }
.neg-formula { font-family: 'Courier New', monospace; font-size: .9rem; color: var(--orange); }
.stage-title { font-size: 1rem; font-weight: 600; color: var(--white); line-height: 1.3; }
.stage-desc { font-size: .82rem; color: var(--sub); line-height: 1.5; margin-top: 8px; }
.result-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; font-weight: 600; font-size: .9rem; }
.result-badge.ok { background: #1d3a2a; color: var(--green); }
.result-badge.fail { background: #3a1d28; color: var(--red); }
.ce-path { font-family: 'Courier New', monospace; font-size: .75rem; color: var(--sub); line-height: 1.6; }
.ce-path .pref { color: var(--orange); }
.ce-path .cyc { color: var(--red); }
.spacer { flex: 1; }
#viz { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; position: relative; }
#graph-svg { width: 100%; height: 100%; }
footer { background: var(--panel); border-top: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
.progress-dots { display: flex; gap: 6px; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); transition: all .3s; cursor: pointer; }
.dot.active { background: var(--blue); transform: scale(1.3); }
.dot.visited { background: var(--gray); }
.ctrl-btn { padding: 8px 20px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--white); cursor: pointer; font-size: .9rem; transition: all .15s; }
.ctrl-btn:hover { border-color: var(--blue); color: var(--blue); }
.ctrl-btn.primary { background: var(--blue); color: var(--bg); border-color: var(--blue); font-weight: 600; }
.ctrl-btn.playing { background: var(--orange); color: var(--bg); border-color: var(--orange); }
.speed-wrap { display: flex; align-items: center; gap: 8px; margin-left: auto; color: var(--sub); font-size: .8rem; }
input[type=range] { accent-color: var(--blue); width: 90px; }
</style>
</head>
<body>
<header>
  <div>
    <div class="sub">PROYECTO FINAL · TEORÍA DE AUTÓMATAS</div>
    <h1>Verificador LTL — Autómatas de Büchi</h1>
  </div>
  <div class="example-tabs" id="example-tabs"></div>
</header>
<div id="main">
  <aside id="sidebar">
    <div class="info-block">
      <div class="label">Propiedad φ</div>
      <div class="formula" id="phi-display"></div>
    </div>
    <div class="info-block">
      <div class="label">Negación ¬φ (NNF)</div>
      <div class="neg-formula" id="negphi-display"></div>
    </div>
    <div class="info-block">
      <div class="label">Paso actual</div>
      <div class="stage-title" id="stage-title-text"></div>
      <div class="stage-desc" id="stage-desc-text"></div>
    </div>
    <div class="info-block" id="result-block" style="display:none">
      <div class="label">Resultado</div>
      <div id="result-badge-wrap"></div>
      <div class="ce-path" id="ce-display" style="margin-top:8px"></div>
    </div>
    <div class="spacer"></div>
    <div style="font-size:.72rem;color:var(--gray);text-align:center;line-height:1.4">
      LTL → GPVW → Büchi → Producto M×A → Nested DFS
    </div>
  </aside>
  <section id="viz">
    <svg id="graph-svg" viewBox="0 0 780 460" preserveAspectRatio="xMidYMid meet"></svg>
  </section>
</div>
<footer>
  <button class="ctrl-btn" id="btn-prev">◀ Anterior</button>
  <div class="progress-dots" id="progress-dots"></div>
  <button class="ctrl-btn" id="btn-auto">▶ Auto</button>
  <button class="ctrl-btn primary" id="btn-next">Siguiente ▶</button>
  <div class="speed-wrap">Vel: <input type="range" id="speed-slider" min="400" max="3000" step="200" value="1400"></div>
</footer>
<script>
const DATA = [{"id":"semaforo","name":"Semáforo","phi":"G F verde","phi_html":"G F <em>verde</em>","neg_phi":"F(G(!verde))","kripke":{"states":["rojo","verde","amarillo"],"initial":"rojo","transitions":[{"from":"rojo","to":"verde"},{"from":"verde","to":"amarillo"},{"from":"amarillo","to":"rojo"}],"labels":{"rojo":["rojo"],"verde":["verde"],"amarillo":["amarillo"]}},"buchi":{"n_states":2,"initial":0,"transitions":[{"from":0,"guard":"!verde","to":1},{"from":0,"guard":"T","to":0},{"from":1,"guard":"!verde","to":1}],"accepting":[1]},"product":{"states":[{"k":"rojo","b":0},{"k":"verde","b":1},{"k":"verde","b":0},{"k":"amarillo","b":0},{"k":"rojo","b":1}],"initial":[0],"transitions":[{"from":0,"to":1},{"from":3,"to":4},{"from":3,"to":0},{"from":2,"to":3},{"from":0,"to":2},{"from":4,"to":1}],"accepting":[1,4]},"result":true,"counterexample":null},{"id":"exclusion","name":"Exclusión Mutua","phi":"G F critica_A","phi_html":"G F <em>critica_A</em>","neg_phi":"F(G(!critica_A))","kripke":{"states":["idle_idle","req_idle","crit_idle","idle_req","req_req","idle_crit"],"initial":"idle_idle","transitions":[{"from":"idle_idle","to":"req_idle"},{"from":"idle_idle","to":"idle_req"},{"from":"req_idle","to":"crit_idle"},{"from":"req_idle","to":"req_req"},{"from":"crit_idle","to":"idle_idle"},{"from":"idle_req","to":"idle_crit"},{"from":"idle_req","to":"req_req"},{"from":"idle_crit","to":"idle_idle"},{"from":"req_req","to":"crit_idle"},{"from":"req_req","to":"idle_crit"}],"labels":{"crit_idle":["critica_A"],"idle_crit":["critica_B"],"req_idle":["request_A"],"idle_req":["request_B"],"req_req":["request_A","request_B"],"idle_idle":[]}},"buchi":{"n_states":2,"initial":0,"transitions":[{"from":0,"guard":"!critica_A","to":1},{"from":0,"guard":"T","to":0},{"from":1,"guard":"!critica_A","to":1}],"accepting":[1]},"product":{"states":[{"k":"idle_idle","b":0},{"k":"req_idle","b":1},{"k":"req_idle","b":0},{"k":"idle_req","b":1},{"k":"idle_req","b":0},{"k":"crit_idle","b":1},{"k":"req_req","b":1},{"k":"crit_idle","b":0},{"k":"req_req","b":0},{"k":"idle_crit","b":1},{"k":"idle_crit","b":0},{"k":"idle_idle","b":1}],"initial":[0],"transitions":[{"from":4,"to":9},{"from":4,"to":6},{"from":0,"to":2},{"from":8,"to":9},{"from":10,"to":0},{"from":1,"to":6},{"from":9,"to":11},{"from":2,"to":5},{"from":2,"to":8},{"from":6,"to":5},{"from":3,"to":9},{"from":4,"to":8},{"from":3,"to":6},{"from":8,"to":5},{"from":0,"to":1},{"from":11,"to":1},{"from":10,"to":11},{"from":0,"to":4},{"from":2,"to":7},{"from":1,"to":5},{"from":7,"to":0},{"from":4,"to":10},{"from":8,"to":7},{"from":0,"to":3},{"from":8,"to":10},{"from":11,"to":3},{"from":2,"to":6},{"from":6,"to":9}],"accepting":[1,3,5,6,9,11]},"result":false,"counterexample":{"prefix":[{"k":"idle_idle","b":0},{"k":"req_idle","b":0},{"k":"req_req","b":0},{"k":"idle_crit","b":1},{"k":"idle_idle","b":1},{"k":"req_idle","b":1},{"k":"req_req","b":1}],"cycle":[{"k":"req_req","b":1},{"k":"idle_crit","b":1},{"k":"idle_idle","b":1},{"k":"req_idle","b":1},{"k":"req_req","b":1}]}},{"id":"protocolo","name":"Protocolo con Bug","phi":"G F grant","phi_html":"G F <em>grant</em>","neg_phi":"F(G(!grant))","kripke":{"states":["idle","request","grant","deny"],"initial":"idle","transitions":[{"from":"idle","to":"request"},{"from":"request","to":"grant"},{"from":"request","to":"deny"},{"from":"grant","to":"idle"},{"from":"deny","to":"request"}],"labels":{"idle":[],"request":["request"],"grant":["grant"],"deny":["deny"]}},"buchi":{"n_states":2,"initial":0,"transitions":[{"from":0,"guard":"!grant","to":1},{"from":0,"guard":"T","to":0},{"from":1,"guard":"!grant","to":1}],"accepting":[1]},"product":{"states":[{"k":"idle","b":0},{"k":"request","b":1},{"k":"request","b":0},{"k":"grant","b":1},{"k":"deny","b":1},{"k":"grant","b":0},{"k":"deny","b":0}],"initial":[0],"transitions":[{"from":0,"to":1},{"from":2,"to":4},{"from":6,"to":2},{"from":4,"to":1},{"from":6,"to":1},{"from":1,"to":4},{"from":2,"to":3},{"from":0,"to":2},{"from":2,"to":6},{"from":5,"to":0},{"from":2,"to":5},{"from":1,"to":3}],"accepting":[1,3,4]},"result":false,"counterexample":{"prefix":[{"k":"idle","b":0},{"k":"request","b":1},{"k":"deny","b":1}],"cycle":[{"k":"deny","b":1},{"k":"request","b":1},{"k":"deny","b":1}]}}];

const STAGE_DEFS = [
  { title:'Paso 1 / 7 — Sistema (Estructura de Kripke)', desc: ex=>`El sistema <strong>${ex.name}</strong> se modela como M = (S, s₀, R, L). Tiene ${ex.kripke.states.length} estados y ${ex.kripke.transitions.length} transiciones. Estado inicial (verde): <strong>${ex.kripke.initial}</strong>.`, render: renderKripke },
  { title:'Paso 2 / 7 — Negación y Forma Normal Negativa', desc: ex=>`Para verificar φ buscamos trazas que <em>violan</em> φ, es decir, satisfacen ¬φ.<br><br>¬φ en NNF = <strong>${ex.neg_phi}</strong><br><br>M ⊨ φ ⟺ L(M) ∩ L(A¬φ) = ∅`, render: renderNegation },
  { title:'Paso 3 / 7 — Autómata de Büchi A(¬φ)', desc: ex=>`GPVW construye un NBA que acepta las trazas donde φ falla. ${ex.buchi.n_states} estados; los de aceptación (amarillo, doble círculo) deben visitarse ∞ veces.`, render: renderBuchi },
  { title:'Paso 4 / 7 — Producto M × A', desc: ex=>`El producto combina sistema y Büchi: ${ex.product.states.length} estados, ${ex.product.accepting.length} aceptantes (amarillo). Buscamos ciclo aceptante con Nested DFS.`, render: renderProduct },
  { title:'Paso 5 / 7 — Nested DFS — Búsqueda exterior', desc: ex=>ex.result?`DFS externo completa sin encontrar ningún estado aceptante en ciclo.`:`DFS externo alcanza estado aceptante por el camino prefijo (naranja): termina en <strong>(${ex.counterexample.prefix.at(-1).k}, q${ex.counterexample.prefix.at(-1).b})</strong>.`, render: renderDFSOuter },
  { title:'Paso 6 / 7 — Nested DFS — Ciclo encontrado', desc: ex=>ex.result?`DFS interno no encuentra camino de regreso a ningún estado aceptante. No existe ciclo aceptante → propiedad <strong>VERIFICADA</strong>.`:`Ciclo aceptante detectado (rojo): <strong>${ex.counterexample.cycle.map(s=>s.k).join(' → ')}</strong>. Bug detectado formalmente.`, render: renderDFSInner },
  { title:'Paso 7 / 7 — Resultado final', desc: ex=>ex.result?`No existe traza infinita donde φ falle. Garantía formal: <strong>M ⊨ ${ex.phi}</strong> en todos los comportamientos posibles.`:`Traza infinita que viola <strong>${ex.phi}</strong>:<br><br>Prefijo: ${ex.counterexample.prefix.map(s=>s.k).join(' → ')}<br>Ciclo: (${ex.counterexample.cycle.map(s=>s.k).join(' → ')})^ω`, render: renderResult }
];

let exIdx=0, stage=0, autoTimer=null;
const svg=d3.select('#graph-svg'), W=780, H=460;
const C={blue:'#89b4fa',green:'#a6e3a1',red:'#f38ba8',yellow:'#f9e2af',orange:'#fab387',gray:'#585b70',bg:'#1e1e2e',white:'#cdd6f4',sub:'#a6adc8'};

const ABBR={idle_idle:'ii',req_idle:'ri',crit_idle:'ci',idle_req:'ir',req_req:'rr',idle_crit:'ic'};
function abbreviate(s){return ABBR[s]||s;}
function prodLabel(s){return `${abbreviate(s.k)}\nq${s.b}`;}

function circularPos(n,cx,cy,r){return Array.from({length:n},(_,i)=>({x:cx+r*Math.cos(2*Math.PI*i/n-Math.PI/2),y:cy+r*Math.sin(2*Math.PI*i/n-Math.PI/2)}));}

function forcePos(nodes,links,cx,cy){
  const ns=nodes.map((n,i)=>({id:i,...n}));
  const ls=links.map(l=>({source:l.from,target:l.to}));
  const sim=d3.forceSimulation(ns)
    .force('link',d3.forceLink(ls).id(d=>d.id).distance(90).strength(.8))
    .force('charge',d3.forceManyBody().strength(-280))
    .force('center',d3.forceCenter(cx,cy))
    .force('collide',d3.forceCollide(48))
    .stop();
  for(let i=0;i<800;i++)sim.tick();
  return ns.map(n=>({x:n.x,y:n.y}));
}

function setupDefs(){
  svg.selectAll('defs').remove();
  const defs=svg.append('defs');
  for(const[id,col]of[['arrow','#585b70'],['arrow-blue','#89b4fa'],['arrow-red','#f38ba8'],['arrow-orange','#fab387'],['arrow-green','#a6e3a1']]){
    defs.append('marker').attr('id',id).attr('viewBox','0 -4 8 8').attr('refX',8).attr('refY',0).attr('markerWidth',6).attr('markerHeight',6).attr('orient','auto')
      .append('path').attr('d','M0,-4L8,0L0,4Z').attr('fill',col);
  }
}
function clearSVG(){svg.selectAll('*').remove();setupDefs();}

function edgePath(x1,y1,x2,y2,curv,R,isSelf){
  if(isSelf){return `M${x1-14},${y1-R} C${x1-38},${y1-R-55} ${x1+38},${y1-R-55} ${x1+14},${y1-R}`;}
  const dx=x2-x1,dy=y2-y1,dist=Math.hypot(dx,dy)||1;
  const nx=-dy/dist,ny=dx/dist;
  const mx=(x1+x2)/2+nx*curv,my=(y1+y2)/2+ny*curv;
  const sx=x1+(mx-x1)/dist*R,sy=y1+(my-y1)/dist*R;
  const ex2=x2+(mx-x2)/dist*(R+4),ey2=y2+(my-y2)/dist*(R+4);
  return `M${sx},${sy} Q${mx},${my} ${ex2},${ey2}`;
}

function drawGraph({nodes,edges,pos,nodeR=36,accepting=new Set(),initial=-1,nodeColor=()=>C.blue,edgeColor=()=>C.gray,edgeLabel=()=>'',nodeText=i=>String(i),markerSuffix=()=>''}){
  const g=svg.append('g');
  const pairCount={},pairIdx={};
  edges.forEach(e=>{const k=`${e.from}-${e.to}`;pairCount[k]=(pairCount[k]||0)+1;});
  edges.forEach(e=>{const k=`${e.from}-${e.to}`;pairIdx[k]=pairIdx[k]||0;});
  edges.forEach(e=>{
    const k=`${e.from}-${e.to}`,rk=`${e.to}-${e.from}`;
    const idx=pairIdx[k]++;
    const hasRev=(pairCount[rk]||0)>0;
    const curv=hasRev?34:(pairCount[k]>1?24*(idx-(pairCount[k]-1)/2):0);
    const isSelf=e.from===e.to;
    const x1=pos[e.from].x,y1=pos[e.from].y,x2=pos[e.to].x,y2=pos[e.to].y;
    const col=edgeColor(e),ms=markerSuffix(e);
    g.append('path').attr('d',edgePath(x1,y1,x2,y2,curv,nodeR,isSelf)).attr('fill','none').attr('stroke',col).attr('stroke-width',1.7).attr('marker-end',`url(#arrow${ms})`);
    const lbl=edgeLabel(e);
    if(lbl){
      const isSelfL=isSelf;
      const mx2=isSelfL?x1:(x1+x2)/2+(-(y2-y1)/Math.hypot(x2-x1,y2-y1)||0)*(hasRev?36:20);
      const my2=isSelfL?y1-nodeR-40:(y1+y2)/2+((x2-x1)/Math.hypot(x2-x1,y2-y1)||0)*(hasRev?36:20)-(hasRev?18:0);
      g.append('text').attr('x',mx2).attr('y',my2).attr('text-anchor','middle').attr('fill',C.sub).attr('font-size',9).attr('font-family','Courier New').text(lbl);
    }
  });
  nodes.forEach((_,i)=>{
    const{x,y}=pos[i],col=nodeColor(i),isAcc=accepting.has(i);
    if(isAcc)g.append('circle').attr('cx',x).attr('cy',y).attr('r',nodeR+7).attr('fill','none').attr('stroke',C.yellow).attr('stroke-width',2.5);
    g.append('circle').attr('cx',x).attr('cy',y).attr('r',nodeR).attr('fill',col).attr('stroke','#1e1e2e').attr('stroke-width',2.5);
    const lbl=nodeText(i),lines=lbl.split('\n');
    lines.forEach((ln,li)=>g.append('text').attr('x',x).attr('y',y+(li-(lines.length-1)/2)*13+1).attr('text-anchor','middle').attr('dominant-baseline','middle').attr('fill','#1e1e2e').attr('font-size',lbl.replace('\n','').length>10?7:lbl.replace('\n','').length>6?9:11).attr('font-family','Courier New').attr('font-weight','bold').text(ln));
  });
  if(initial>=0){
    const{x,y}=pos[initial],ang=-Math.PI*.72;
    g.append('line').attr('x1',x+Math.cos(ang)*72).attr('y1',y+Math.sin(ang)*72).attr('x2',x+Math.cos(ang)*(nodeR+5)).attr('y2',y+Math.sin(ang)*(nodeR+5)).attr('stroke',C.green).attr('stroke-width',2.5).attr('marker-end','url(#arrow-green)');
  }
}

function renderKripke(ex,hiNodes=new Set()){
  clearSVG();
  const k=ex.kripke,n=k.states.length;
  const r=n<=3?150:n<=4?130:160;
  const pos=circularPos(n,W/2,H/2-10,r);
  drawGraph({nodes:k.states,edges:k.transitions,pos,nodeR:38,accepting:new Set(),initial:k.states.indexOf(k.initial),
    nodeColor:i=>hiNodes.has(k.states[i])?C.red:(k.states[i]===k.initial?C.green:C.blue),
    edgeColor:()=>C.gray,edgeLabel:()=>'',
    nodeText:i=>{const lb=(k.labels[k.states[i]]||[]);return abbreviate(k.states[i])+(lb.length?'\n{'+lb.join(',')+'}':'');}
  });
  svg.append('text').attr('x',16).attr('y',H-14).attr('fill',C.sub).attr('font-size',10).text(`Kripke M: ${n} estados, ${k.transitions.length} transiciones`);
}

function renderNegation(ex){
  clearSVG();
  const cx=W/2,cy=H/2-20,g=svg.append('g');
  const box=(x,y,w,h,color,text,sub2)=>{
    g.append('rect').attr('x',x-w/2).attr('y',y-h/2).attr('width',w).attr('height',h).attr('rx',10).attr('fill',color).attr('opacity',.12).attr('stroke',color).attr('stroke-width',1.5);
    g.append('text').attr('x',x).attr('y',y-8).attr('text-anchor','middle').attr('fill',color).attr('font-size',18).attr('font-family','Courier New').attr('font-weight','bold').text(text);
    g.append('text').attr('x',x).attr('y',y+14).attr('text-anchor','middle').attr('fill',C.sub).attr('font-size',11).text(sub2);
  };
  box(cx-195,cy,280,80,C.yellow,'φ = '+ex.phi,'Propiedad a verificar');
  g.append('text').attr('x',cx).attr('y',cy+4).attr('text-anchor','middle').attr('fill',C.sub).attr('font-size',26).text('⟹');
  g.append('text').attr('x',cx).attr('y',cy+22).attr('text-anchor','middle').attr('fill',C.sub).attr('font-size',10).text('negar + NNF');
  box(cx+195,cy,280,80,C.orange,'¬φ = '+ex.neg_phi,'Buscamos trazas que violan φ');
  g.append('text').attr('x',cx).attr('y',cy+78).attr('text-anchor','middle').attr('fill',C.white).attr('font-size',13).text('M ⊨ φ  ⟺  L(M) ∩ L(A¬φ) = ∅');
  g.append('rect').attr('x',cx-310).attr('y',cy+100).attr('width',620).attr('height',54).attr('rx',8).attr('fill','#1e1e2e').attr('stroke','#363a4f');
  g.append('text').attr('x',cx).attr('y',cy+122).attr('text-anchor','middle').attr('fill',C.sub).attr('font-size',11).text('GPVW: cada estado del Büchi = conjunto de obligaciones LTL pendientes');
  g.append('text').attr('x',cx).attr('y',cy+143).attr('text-anchor','middle').attr('fill',C.gray).attr('font-size',10).attr('font-family','Courier New').text('Gerth, Peled, Vardi, Wolper (1995) — mismo algoritmo que SPIN / LTL2BA');
}

function renderBuchi(ex){
  clearSVG();
  const b=ex.buchi,n=b.n_states;
  const pos=n===1?[{x:W/2,y:H/2}]:n===2?[{x:W/2-155,y:H/2},{x:W/2+155,y:H/2}]:circularPos(n,W/2,H/2,130);
  drawGraph({nodes:Array.from({length:n},(_,i)=>`q${i}`),edges:b.transitions,pos,nodeR:42,
    accepting:new Set(b.accepting),initial:b.initial,
    nodeColor:i=>b.accepting.includes(i)?C.yellow:C.blue,
    edgeColor:()=>C.gray,edgeLabel:e=>e.guard,nodeText:i=>`q${i}`});
  svg.append('text').attr('x',16).attr('y',H-14).attr('fill',C.sub).attr('font-size',10).text(`Büchi A(¬φ): ${n} estados, doble círculo = F (aceptación Büchi)`);
}

function renderProduct(ex,prefixSet=new Set(),cycleSet=new Set(),prefixEdges=[],cycleEdges=[]){
  clearSVG();
  const p=ex.product,n=p.states.length;
  const pos=n<=5?circularPos(n,W/2,H/2,160):forcePos(p.states,p.transitions,W/2,H/2-10);
  const pIds=new Set(Array.from(prefixSet).map(s=>p.states.findIndex(x=>x.k===s.k&&x.b===s.b)));
  const cIds=new Set(Array.from(cycleSet).map(s=>p.states.findIndex(x=>x.k===s.k&&x.b===s.b)));
  const peSet=new Set(prefixEdges.map(e=>`${e.from}-${e.to}`));
  const ceSet=new Set(cycleEdges.map(e=>`${e.from}-${e.to}`));
  drawGraph({nodes:p.states,edges:p.transitions,pos,nodeR:32,accepting:new Set(p.accepting),initial:p.initial[0],
    nodeColor:i=>cIds.has(i)?C.red:pIds.has(i)?C.orange:(p.accepting.includes(i)?C.yellow:C.blue),
    edgeColor:e=>{const k=`${e.from}-${e.to}`;return ceSet.has(k)?C.red:peSet.has(k)?C.orange:C.gray;},
    edgeLabel:()=>'',nodeText:i=>prodLabel(p.states[i]),
    markerSuffix:e=>{const k=`${e.from}-${e.to}`;return ceSet.has(k)?'-red':peSet.has(k)?'-orange':'';}
  });
  svg.append('text').attr('x',16).attr('y',H-14).attr('fill',C.sub).attr('font-size',10).text(`Producto M×A: ${n} estados, ${p.accepting.length} aceptantes (amarillo)`);
}

function getCEEdges(ex,isPrefix){
  const list=isPrefix?ex.counterexample.prefix:ex.counterexample.cycle;
  const edges=[];
  for(let i=0;i<list.length-1;i++){
    const a=ex.product.states.findIndex(s=>s.k===list[i].k&&s.b===list[i].b);
    const b2=ex.product.states.findIndex(s=>s.k===list[i+1].k&&s.b===list[i+1].b);
    if(a>=0&&b2>=0)edges.push({from:a,to:b2});
  }
  return edges;
}

function renderDFSOuter(ex){
  if(!ex.counterexample){renderProduct(ex);return;}
  const pe=getCEEdges(ex,true);
  renderProduct(ex,new Set(ex.counterexample.prefix),new Set(),pe,[]);
}

function renderDFSInner(ex){
  if(!ex.counterexample){renderProduct(ex);return;}
  const pe=getCEEdges(ex,true),ce=getCEEdges(ex,false);
  renderProduct(ex,new Set(ex.counterexample.prefix),new Set(ex.counterexample.cycle),pe,ce);
}

function renderResult(ex){
  clearSVG();
  if(ex.result){
    renderKripke(ex);
    const g=svg.append('g');
    g.append('rect').attr('x',W/2-190).attr('y',16).attr('width',380).attr('height',64).attr('rx',12).attr('fill','#1d3a2a').attr('stroke',C.green).attr('stroke-width',2.5);
    g.append('text').attr('x',W/2).attr('y',42).attr('text-anchor','middle').attr('fill',C.green).attr('font-size',20).attr('font-weight','bold').text('✅  VERIFICADO');
    g.append('text').attr('x',W/2).attr('y',66).attr('text-anchor','middle').attr('fill',C.sub).attr('font-size',11).text(`M ⊨ ${ex.phi}  en todos los comportamientos posibles`);
  } else {
    const ce=ex.counterexample,hiS=new Set([...ce.prefix.map(s=>s.k),...ce.cycle.map(s=>s.k)]);
    renderKripke(ex,hiS);
    const g=svg.append('g');
    g.append('rect').attr('x',W/2-250).attr('y',12).attr('width',500).attr('height',66).attr('rx',12).attr('fill','#3a1d28').attr('stroke',C.red).attr('stroke-width',2.5);
    g.append('text').attr('x',W/2).attr('y',36).attr('text-anchor','middle').attr('fill',C.red).attr('font-size',17).attr('font-weight','bold').text('❌  VIOLADO — Contraejemplo encontrado');
    const pref=ce.prefix.map(s=>abbreviate(s.k)).join(' → ');
    const cyc='('+ce.cycle.map(s=>abbreviate(s.k)).join(' → ')+')^ω';
    g.append('text').attr('x',W/2).attr('y',62).attr('text-anchor','middle').attr('fill',C.orange).attr('font-size',10).attr('font-family','Courier New').text(pref+'  ·  '+cyc);
  }
}

function updateSidebar(){
  const ex=DATA[exIdx];
  document.getElementById('phi-display').textContent=ex.phi;
  document.getElementById('negphi-display').textContent=ex.neg_phi;
  const s=STAGE_DEFS[stage];
  document.getElementById('stage-title-text').textContent=s.title;
  document.getElementById('stage-desc-text').innerHTML=s.desc(ex);
  const rb=document.getElementById('result-block');
  if(stage===6){
    rb.style.display='';
    document.getElementById('result-badge-wrap').innerHTML=ex.result?'<div class="result-badge ok">✅ Verificado</div>':'<div class="result-badge fail">❌ Violado</div>';
    const ced=document.getElementById('ce-display');
    if(!ex.result&&ex.counterexample){
      const pref=ex.counterexample.prefix.map(s=>abbreviate(s.k)).join(' → ');
      const cyc=ex.counterexample.cycle.map(s=>abbreviate(s.k)).join(' → ');
      ced.innerHTML=`<span class="pref">Prefijo: ${pref}</span><br><span class="cyc">Ciclo: (${cyc})^ω</span>`;
    } else ced.innerHTML='';
  } else rb.style.display='none';
}

function updateDots(){
  const c=document.getElementById('progress-dots');c.innerHTML='';
  for(let i=0;i<STAGE_DEFS.length;i++){
    const d=document.createElement('div');
    d.className='dot'+(i===stage?' active':i<stage?' visited':'');
    d.title=STAGE_DEFS[i].title;
    d.onclick=()=>gotoStage(i);
    c.appendChild(d);
  }
}

function updateTabs(){
  const c=document.getElementById('example-tabs');c.innerHTML='';
  DATA.forEach((ex,i)=>{
    const b=document.createElement('button');
    b.className='example-tab'+(i===exIdx?' active':'');
    b.textContent=ex.name;
    b.onclick=()=>{if(autoTimer)toggleAuto();exIdx=i;stage=0;render();};
    c.appendChild(b);
  });
}

function render(){
  const ex=DATA[exIdx];
  STAGE_DEFS[stage].render(ex);
  updateSidebar();
  updateDots();
  updateTabs();
  document.getElementById('btn-prev').disabled=stage===0;
  document.getElementById('btn-next').disabled=stage===STAGE_DEFS.length-1;
}

function gotoStage(n){stage=Math.max(0,Math.min(STAGE_DEFS.length-1,n));render();}

function toggleAuto(){
  const btn=document.getElementById('btn-auto');
  if(autoTimer){
    clearInterval(autoTimer);autoTimer=null;
    btn.textContent='▶ Auto';btn.classList.remove('playing');
  } else {
    btn.textContent='⏸ Pausar';btn.classList.add('playing');
    const speed=parseInt(document.getElementById('speed-slider').value);
    autoTimer=setInterval(()=>{
      if(stage<STAGE_DEFS.length-1){stage++;render();}
      else{toggleAuto();}
    },speed);
  }
}

document.getElementById('btn-next').onclick=()=>{if(stage<STAGE_DEFS.length-1){stage++;render();}};
document.getElementById('btn-prev').onclick=()=>{if(stage>0){stage--;render();}};
document.getElementById('btn-auto').onclick=toggleAuto;
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();if(stage<STAGE_DEFS.length-1){stage++;render();}}
  if(e.key==='ArrowLeft'){e.preventDefault();if(stage>0){stage--;render();}}
});

setupDefs();render();
</script>
</body>
</html>
