<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Verificador LTL — Autómatas de Büchi</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1e1e2e; --panel: #24273a; --border: #363a4f;
  --blue: #89b4fa; --green: #a6e3a1; --red: #f38ba8; --yellow: #f9e2af;
  --orange: #fab387; --gray: #585b70; --white: #cdd6f4; --sub: #a6adc8; --purple: #cba6f7;
}
html, body { height: 100%; background: var(--bg); color: var(--white); font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
body { display: flex; flex-direction: column; }

/* ── deck ──────────────────────────────────────────────────────── */
#deck { flex: 1; position: relative; overflow: hidden; }
.slide { position: absolute; inset: 0; display: flex; opacity: 0; pointer-events: none; transition: opacity .45s ease; }
.slide.active { opacity: 1; pointer-events: auto; }

/* ── nav footer ────────────────────────────────────────────────── */
footer { background: var(--panel); border-top: 1px solid var(--border); padding: 10px 28px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
.nav-btn { width: 40px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--white); cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.nav-btn:hover:not(:disabled) { border-color: var(--blue); color: var(--blue); }
.nav-btn:disabled { opacity: .3; cursor: default; }
#progress-wrap { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
#progress-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width .4s ease; }
#slide-label { font-size: .78rem; color: var(--sub); min-width: 120px; text-align: center; }
#slide-count { font-size: .75rem; color: var(--gray); font-family: 'Courier New', monospace; min-width: 40px; text-align: right; }

/* ─────────────────────────────────────────────────────────────── */
/* SLIDE TYPES                                                      */
/* ─────────────────────────────────────────────────────────────── */

/* ── S0: Title ─────────────────────────────────────────────────── */
.s-title { flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 0; background: var(--bg); position: relative; overflow: hidden; }
.s-title::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle at 1px 1px, rgba(137,180,250,.12) 1px, transparent 0); background-size: 30px 30px; }
.title-content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 24px; max-width: 700px; padding: 40px; }
.title-badge { font-size: .72rem; letter-spacing: .15em; text-transform: uppercase; color: var(--sub); border: 1px solid var(--border); padding: 5px 16px; border-radius: 20px; }
.title-h1 { font-size: clamp(2rem, 4vw, 3rem); font-weight: 700; line-height: 1.15; color: var(--white); }
.title-h1 span { color: var(--blue); }
.title-formula { font-family: 'Courier New', monospace; font-size: clamp(.9rem, 1.5vw, 1.15rem); color: var(--yellow); background: rgba(249,226,175,.08); border: 1px solid rgba(249,226,175,.2); padding: 12px 24px; border-radius: 8px; }
.title-meta { font-size: .8rem; color: var(--gray); }
.title-chips { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.chip { font-size: .75rem; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); color: var(--sub); }

/* ── Concept slides (full-width, 2 columns) ─────────────────────── */
.s-concept { background: var(--bg); }
.concept-grid { display: grid; grid-template-columns: 1fr 1fr; width: 100%; height: 100%; }
.col { padding: 48px 52px; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
.col-divider { border-left: 1px solid var(--border); }
.concept-tag { font-size: .65rem; text-transform: uppercase; letter-spacing: .12em; color: var(--blue); font-weight: 600; }
.concept-h2 { font-size: clamp(1.5rem, 2.5vw, 2.1rem); font-weight: 700; color: var(--white); line-height: 1.2; }
.concept-body { font-size: .9rem; color: var(--sub); line-height: 1.7; }
.concept-body strong { color: var(--white); }
.concept-body code { font-family: 'Courier New', monospace; font-size: .85rem; color: var(--yellow); background: rgba(249,226,175,.1); padding: 1px 6px; border-radius: 4px; }
.bullet-list { display: flex; flex-direction: column; gap: 10px; }
.bullet { display: flex; align-items: flex-start; gap: 10px; font-size: .88rem; color: var(--sub); line-height: 1.5; }
.bullet .icon { flex-shrink: 0; width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: .8rem; }
.big-formula-box { background: rgba(137,180,250,.07); border: 1px solid rgba(137,180,250,.22); border-radius: 12px; padding: 28px 32px; text-align: center; }
.big-formula { font-family: 'Courier New', monospace; font-size: clamp(1rem, 1.8vw, 1.4rem); color: var(--yellow); }
.big-formula-explain { font-size: .82rem; color: var(--sub); margin-top: 12px; line-height: 1.6; }
.op-list { display: flex; flex-direction: column; gap: 12px; }
.op-row { display: flex; align-items: flex-start; gap: 14px; }
.op-sym { font-family: 'Courier New', monospace; font-size: 1rem; color: var(--blue); min-width: 80px; font-weight: 700; }
.op-def { font-size: .85rem; color: var(--sub); line-height: 1.5; }
.op-def em { color: var(--white); font-style: normal; font-weight: 600; }
.pipeline-boxes { display: flex; align-items: center; gap: 0; width: 100%; }
.pip-box { flex: 1; text-align: center; }
.pip-inner { border: 1.5px solid; border-radius: 10px; padding: 14px 8px; margin: 0 4px; }
.pip-icon { font-size: 1.4rem; margin-bottom: 6px; }
.pip-title { font-size: .78rem; font-weight: 700; }
.pip-sub { font-size: .68rem; color: var(--sub); margin-top: 4px; line-height: 1.4; }
.pip-arrow { font-size: 1.4rem; color: var(--gray); flex-shrink: 0; padding: 0 2px; }
.pip-result { display: flex; gap: 24px; justify-content: center; margin-top: 24px; }
.pip-res-item { display: flex; align-items: center; gap: 8px; font-size: .85rem; color: var(--sub); }

/* ── Split slides (left panel + right graph) ─────────────────────── */
.s-split { background: var(--bg); }
.split-left { width: 300px; flex-shrink: 0; background: var(--panel); border-right: 1px solid var(--border); padding: 36px 28px; display: flex; flex-direction: column; justify-content: center; gap: 18px; }
.split-right { flex: 1; display: flex; align-items: center; justify-content: center; padding: 16px; position: relative; }
.split-right svg { width: 100%; height: 100%; }
.split-tag { font-size: .62rem; text-transform: uppercase; letter-spacing: .12em; color: var(--blue); font-weight: 600; }
.split-h2 { font-size: 1.2rem; font-weight: 700; color: var(--white); line-height: 1.3; }
.split-body { font-size: .8rem; color: var(--sub); line-height: 1.65; }
.split-body code { font-family: 'Courier New', monospace; font-size: .76rem; color: var(--yellow); background: rgba(249,226,175,.1); padding: 1px 5px; border-radius: 3px; }
.split-body strong { color: var(--white); }
.info-pill { background: var(--bg); border-radius: 8px; padding: 10px 14px; font-size: .78rem; color: var(--sub); }
.info-pill .pval { font-family: 'Courier New', monospace; color: var(--yellow); font-size: .82rem; }

/* ── Result slide ───────────────────────────────────────────────── */
.s-result { flex-direction: column; align-items: center; justify-content: center; gap: 32px; background: var(--bg); }
.result-badge-big { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 32px 56px; border-radius: 18px; border: 2px solid; }
.result-badge-big.ok { background: rgba(29,58,42,.6); border-color: var(--green); }
.result-badge-big.fail { background: rgba(58,29,40,.6); border-color: var(--red); }
.rb-icon { font-size: 2.8rem; }
.rb-title { font-size: 1.8rem; font-weight: 800; letter-spacing: .03em; }
.rb-sub { font-size: .88rem; opacity: .7; font-family: 'Courier New', monospace; }
.result-detail { max-width: 560px; text-align: center; font-size: .88rem; color: var(--sub); line-height: 1.7; }
.result-detail .formula { font-family: 'Courier New', monospace; font-size: 1rem; color: var(--yellow); display: block; margin: 8px 0; }
.ce-box { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px 24px; text-align: left; }
.ce-box .ce-label { font-size: .65rem; text-transform: uppercase; letter-spacing: .1em; color: var(--gray); margin-bottom: 6px; }
.ce-box .ce-pref { font-family: 'Courier New', monospace; font-size: .82rem; color: var(--orange); }
.ce-box .ce-cycle { font-family: 'Courier New', monospace; font-size: .82rem; color: var(--red); margin-top: 4px; }
</style>
</head>
<body>
<div id="deck"></div>
<footer>
  <button class="nav-btn" id="btn-prev" onclick="go(cur-1)">←</button>
  <div id="progress-wrap"><div id="progress-fill"></div></div>
  <span id="slide-label"></span>
  <div id="progress-wrap2" style="flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden"><div id="progress-fill2" style="height:100%;background:var(--blue);border-radius:2px;transition:width .4s ease"></div></div>
  <span id="slide-count"></span>
  <button class="nav-btn" id="btn-next" onclick="go(cur+1)">→</button>
</footer>
<script>
// ── data (2 examples) ─────────────────────────────────────────────
const EX = [
  { name:'Semáforo', phi:'G F verde', neg:'F(G(!verde))',
    kripke:{states:['rojo','verde','amarillo'],initial:'rojo',
      trans:[{f:'rojo',t:'verde'},{f:'verde',t:'amarillo'},{f:'amarillo',t:'rojo'}],
      labels:{rojo:['rojo'],verde:['verde'],amarillo:['amarillo']}},
    buchi:{n:2,init:0,trans:[{f:0,g:'!verde',t:1},{f:0,g:'T',t:0},{f:1,g:'!verde',t:1}],acc:[1]},
    product:{states:[{k:'rojo',b:0},{k:'verde',b:1},{k:'verde',b:0},{k:'amarillo',b:0},{k:'rojo',b:1}],
      init:[0],trans:[{f:0,t:1},{f:3,t:4},{f:3,t:0},{f:2,t:3},{f:0,t:2},{f:4,t:1}],acc:[1,4]},
    result:true, ce:null },
  { name:'Protocolo con Bug', phi:'G F grant', neg:'F(G(!grant))',
    kripke:{states:['idle','request','grant','deny'],initial:'idle',
      trans:[{f:'idle',t:'request'},{f:'request',t:'grant'},{f:'request',t:'deny'},{f:'grant',t:'idle'},{f:'deny',t:'request'}],
      labels:{idle:[],request:['request'],grant:['grant'],deny:['deny']}},
    buchi:{n:2,init:0,trans:[{f:0,g:'!grant',t:1},{f:0,g:'T',t:0},{f:1,g:'!grant',t:1}],acc:[1]},
    product:{states:[{k:'idle',b:0},{k:'request',b:1},{k:'request',b:0},{k:'grant',b:1},{k:'deny',b:1},{k:'grant',b:0},{k:'deny',b:0}],
      init:[0],trans:[{f:0,t:1},{f:2,t:4},{f:6,t:2},{f:4,t:1},{f:6,t:1},{f:1,t:4},{f:2,t:3},{f:0,t:2},{f:2,t:6},{f:5,t:0},{f:2,t:5},{f:1,t:3}],acc:[1,3,4]},
    result:false,
    ce:{prefix:[{k:'idle',b:0},{k:'request',b:1},{k:'deny',b:1}],
        cycle:[{k:'deny',b:1},{k:'request',b:1},{k:'deny',b:1}]} }
];

// ── svg helpers ───────────────────────────────────────────────────
const C={blue:'#89b4fa',green:'#a6e3a1',red:'#f38ba8',yellow:'#f9e2af',orange:'#fab387',gray:'#585b70',bg:'#1e1e2e',white:'#cdd6f4',sub:'#a6adc8'};

function mkDefs(svg){
  svg.selectAll('defs').remove();
  const d=svg.append('defs');
  [['arr','#8890a6'],['arr-g',C.green],['arr-o',C.orange],['arr-r',C.red],['arr-b',C.blue]].forEach(([id,col])=>{
    d.append('marker').attr('id',id).attr('viewBox','0 -5 10 10').attr('refX',9).attr('refY',0).attr('markerWidth',8).attr('markerHeight',8).attr('orient','auto').append('path').attr('d','M0,-5L10,0L0,5Z').attr('fill',col);
  });
}

function epath(x1,y1,x2,y2,curv,R,self){
  const GAP=R+8;
  if(self) return `M${x1-14},${y1-R} C${x1-44},${y1-R-65} ${x1+44},${y1-R-65} ${x1+14},${y1-R}`;
  const dx=x2-x1,dy=y2-y1,dist=Math.hypot(dx,dy)||1;
  if(curv===0) return `M${x1+dx/dist*R},${y1+dy/dist*R} L${x2-dx/dist*GAP},${y2-dy/dist*GAP}`;
  const nx=-dy/dist,ny=dx/dist;
  const mx=(x1+x2)/2+nx*curv,my=(y1+y2)/2+ny*curv;
  const ds=Math.hypot(mx-x1,my-y1)||1,de=Math.hypot(mx-x2,my-y2)||1;
  return `M${x1+(mx-x1)/ds*R},${y1+(my-y1)/ds*R} Q${mx},${my} ${x2+(mx-x2)/de*GAP},${y2+(my-y2)/de*GAP}`;
}

function animP(sel,delay,dur=420){sel.each(function(){const el=d3.select(this);let l;try{l=this.getTotalLength();}catch(e){return;}el.attr('stroke-dasharray',l).attr('stroke-dashoffset',l).transition().delay(delay).duration(dur).ease(d3.easeCubicOut).attr('stroke-dashoffset',0);});}

function circPos(n,cx,cy,r){return Array.from({length:n},(_,i)=>({x:cx+r*Math.cos(2*Math.PI*i/n-Math.PI/2),y:cy+r*Math.sin(2*Math.PI*i/n-Math.PI/2)}));}
function forcePos(nodes,links,cx,cy){
  const ns=nodes.map((n,i)=>({id:i,...n})),ls=links.map(l=>({source:l.f,target:l.t}));
  const sim=d3.forceSimulation(ns).force('link',d3.forceLink(ls).id(d=>d.id).distance(90).strength(.9)).force('charge',d3.forceManyBody().strength(-300)).force('center',d3.forceCenter(cx,cy)).force('collide',d3.forceCollide(48)).stop();
  for(let i=0;i<900;i++)sim.tick();
  return ns.map(n=>({x:n.x,y:n.y}));
}

const ABBR={idle_idle:'ii',req_idle:'ri',crit_idle:'ci',idle_req:'ir',req_req:'rr',idle_crit:'ic'};
function ab(s){return ABBR[s]||s;}

function drawNodes(g,pos,nodes,nodeR,colorFn,labelFn,accSet,initial,anim,baseDelay){
  // draw acceptance rings first
  nodes.forEach((_,i)=>{
    if(!accSet.has(i))return;
    const{x,y}=pos[i];
    const ring=g.append('circle').attr('cx',x).attr('cy',y).attr('r',nodeR+8).attr('fill','none').attr('stroke',C.yellow).attr('stroke-width',2.5).attr('stroke-dasharray','6 3');
    if(anim)ring.attr('opacity',0).transition().delay(baseDelay+i*55).duration(300).attr('opacity',1);
  });
  nodes.forEach((_,i)=>{
    const{x,y}=pos[i],col=colorFn(i),d=baseDelay+i*55;
    const c=g.append('circle').attr('cx',x).attr('cy',y).attr('fill',col).attr('stroke','#13131e').attr('stroke-width',2.5);
    if(anim){c.attr('r',0).attr('opacity',0).transition().delay(d).duration(300).ease(d3.easeBackOut.overshoot(1.5)).attr('r',nodeR).attr('opacity',1);}
    else c.attr('r',nodeR);
    const lbl=labelFn(i),lines=lbl.split('\n');
    lines.forEach((ln,li)=>{
      const t=g.append('text').attr('x',x).attr('y',y+(li-(lines.length-1)/2)*13+1).attr('text-anchor','middle').attr('dominant-baseline','middle').attr('fill','#13131e').attr('font-size',lbl.replace('\n','').length>10?7:lbl.replace('\n','').length>6?9:11).attr('font-family','Courier New').attr('font-weight','bold').text(ln);
      if(anim)t.attr('opacity',0).transition().delay(d+220).duration(200).attr('opacity',1);
    });
  });
  if(initial>=0){const{x,y}=pos[initial],ang=-Math.PI*.72,D=nodeR+28;const arr=g.append('line').attr('x1',x+Math.cos(ang)*D).attr('y1',y+Math.sin(ang)*D).attr('x2',x+Math.cos(ang)*(nodeR+5)).attr('y2',y+Math.sin(ang)*(nodeR+5)).attr('stroke',C.green).attr('stroke-width',2.5).attr('marker-end','url(#arr-g)');if(anim)arr.attr('opacity',0).transition().delay(baseDelay).duration(300).attr('opacity',1);}
}

function drawEdges(g,pos,edges,nodeR,colorFn,markerFn,labelFn,anim,baseDelay){
  const pCnt={},pIdx={};
  edges.forEach(e=>{const k=`${e.f}-${e.t}`;pCnt[k]=(pCnt[k]||0)+1;});
  edges.forEach(e=>{const k=`${e.f}-${e.t}`;pIdx[k]=pIdx[k]||0;});
  edges.forEach((e,ei)=>{
    const k=`${e.f}-${e.t}`,rk=`${e.t}-${e.f}`;
    const idx=pIdx[k]++;const hasRev=(pCnt[rk]||0)>0;
    const curv=hasRev?38:(pCnt[k]>1?28*(idx-(pCnt[k]-1)/2):0);
    const x1=pos[e.f].x,y1=pos[e.f].y,x2=pos[e.t].x,y2=pos[e.t].y;
    const path=g.append('path').attr('d',epath(x1,y1,x2,y2,curv,nodeR,e.f===e.t)).attr('fill','none').attr('stroke',colorFn(e)).attr('stroke-width',2).attr('marker-end',`url(#${markerFn(e)})`);
    if(anim)animP(path,baseDelay+ei*20,300);
    const lbl=labelFn(e);
    if(lbl){const isSelf=e.f===e.t;const lx=isSelf?x1:(x1+x2)/2+(-(y2-y1)/Math.hypot(x2-x1,y2-y1)||0)*(hasRev?40:22);const ly=isSelf?y1-nodeR-44:(y1+y2)/2+((x2-x1)/Math.hypot(x2-x1,y2-y1)||0)*(hasRev?40:22)-(hasRev?22:0);const lt=g.append('text').attr('x',lx).attr('y',ly).attr('text-anchor','middle').attr('fill',C.sub).attr('font-size',10).attr('font-family','Courier New').text(lbl);if(anim)lt.attr('opacity',0).transition().delay(baseDelay+ei*20+280).duration(200).attr('opacity',1);}
  });
}

// ── graph renderers ───────────────────────────────────────────────
function renderKripke(svgEl, ex, hiNodes=new Set()){
  const svg=d3.select(svgEl);
  const bb=svgEl.getBoundingClientRect();
  const W=bb.width||700,H=bb.height||400;
  svg.attr('viewBox',`0 0 ${W} ${H}`);
  svg.selectAll('*').remove(); mkDefs(svg);
  const k=ex.kripke,n=k.states.length;
  const r=n<=3?Math.min(W,H)*.3:Math.min(W,H)*.32;
  const pos=circPos(n,W/2,H/2-10,r);
  const nodeR=Math.min(W,H)*.085;
  const g=svg.append('g');
  const trans=k.trans.map(t=>({f:k.states.indexOf(t.f),t:k.states.indexOf(t.t)}));
  drawEdges(g,pos,trans,nodeR,()=>C.gray,()=>'arr',()=>'',true,0);
  drawNodes(g,pos,k.states,nodeR,i=>hiNodes.has(k.states[i])?C.red:(k.states[i]===k.initial?C.green:C.blue),i=>{const lb=(k.labels[k.states[i]]||[]);return ab(k.states[i])+(lb.length?'\n{'+lb.join(',')+'}':'');},new Set(),k.states.indexOf(k.initial),true,trans.length*20);
  svg.append('text').attr('x',12).attr('y',H-12).attr('fill',C.sub).attr('font-size',11).attr('opacity',0).text(`M: ${n} estados · ${k.trans.length} transiciones`).transition().delay(800).duration(400).attr('opacity',1);
}

function renderBuchi(svgEl, ex){
  const svg=d3.select(svgEl);
  const bb=svgEl.getBoundingClientRect();
  const W=bb.width||700,H=bb.height||400;
  svg.attr('viewBox',`0 0 ${W} ${H}`);
  svg.selectAll('*').remove(); mkDefs(svg);
  const b=ex.buchi,n=b.n;
  const pos=n===2?[{x:W*.3,y:H/2},{x:W*.7,y:H/2}]:circPos(n,W/2,H/2,Math.min(W,H)*.28);
  const nodeR=Math.min(W,H)*.11;
  const g=svg.append('g');
  const trans=b.trans.map(t=>({f:t.f,t:t.t,g:t.g}));
  drawEdges(g,pos,trans,nodeR,()=>C.gray,()=>'arr',e=>e.g,true,0);
  drawNodes(g,pos,Array.from({length:n}),nodeR,i=>b.acc.includes(i)?C.yellow:C.blue,i=>`q${i}`,new Set(b.acc),b.init,true,trans.length*20);
  svg.append('text').attr('x',12).attr('y',H-12).attr('fill',C.sub).attr('font-size',11).attr('opacity',0).text(`A(¬φ): ${n} estados · doble círculo = aceptación Büchi`).transition().delay(900).duration(400).attr('opacity',1);
}

function renderProduct(svgEl, ex, showDFS=false){
  const svg=d3.select(svgEl);
  const bb=svgEl.getBoundingClientRect();
  const W=bb.width||700,H=bb.height||400;
  svg.attr('viewBox',`0 0 ${W} ${H}`);
  svg.selectAll('*').remove(); mkDefs(svg);
  const p=ex.product,n=p.states.length;
  const pos=n<=5?circPos(n,W/2,H/2,Math.min(W,H)*.33):forcePos(p.states,p.trans,W/2,H/2-10);
  const nodeR=32;
  const g=svg.append('g');
  drawEdges(g,pos,p.trans,nodeR,()=>C.gray,()=>'arr',()=>'',true,0);
  drawNodes(g,pos,p.states,nodeR,i=>p.acc.includes(i)?C.yellow:C.blue,i=>ab(p.states[i].k)+'\nq'+p.states[i].b,new Set(p.acc),p.init[0],true,p.trans.length*20);

  // DFS animation overlay
  if(showDFS && ex.ce){
    const pe=ex.ce.prefix,cy=ex.ce.cycle;
    const edgesFromPath=list=>list.slice(0,-1).map((s,i)=>{const a=p.states.findIndex(x=>x.k===list[i].k&&x.b===list[i].b),b=p.states.findIndex(x=>x.k===list[i+1].k&&x.b===list[i+1].b);return{f:a,t:b};}).filter(e=>e.f>=0&&e.t>=0);
    const pEdges=edgesFromPath(pe),cEdges=edgesFromPath(cy);
    const baseDelay=p.trans.length*20+p.states.length*55+400;
    // draw prefix trace
    const og=svg.append('g');
    pEdges.forEach((e,i)=>{const path=og.append('path').attr('d',epath(pos[e.f].x,pos[e.f].y,pos[e.t].x,pos[e.t].y,0,nodeR+2,e.f===e.t)).attr('fill','none').attr('stroke',C.orange).attr('stroke-width',4).attr('marker-end','url(#arr-o)');animP(path,baseDelay+i*380,400);});
    // draw cycle trace
    const rg=svg.append('g');
    const cycleStart=baseDelay+pEdges.length*380+300;
    cEdges.forEach((e,i)=>{const path=rg.append('path').attr('d',epath(pos[e.f].x,pos[e.f].y,pos[e.t].x,pos[e.t].y,0,nodeR+2,e.f===e.t)).attr('fill','none').attr('stroke',C.red).attr('stroke-width',4).attr('marker-end','url(#arr-r)');animP(path,cycleStart+i*380,400);});
    // highlight nodes
    const prefIdx=pe.map(s=>p.states.findIndex(x=>x.k===s.k&&x.b===s.b));
    const cycIdx=cy.map(s=>p.states.findIndex(x=>x.k===s.k&&x.b===s.b));
    setTimeout(()=>{const hg=svg.append('g');prefIdx.forEach((i,j)=>{hg.append('circle').attr('cx',pos[i].x).attr('cy',pos[i].y).attr('r',nodeR).attr('fill',C.orange).attr('stroke','#13131e').attr('stroke-width',2.5).attr('opacity',0).transition().delay(j*80).duration(280).attr('opacity',1);});},baseDelay+pEdges.length*380+100);
    setTimeout(()=>{const hg=svg.append('g');cycIdx.forEach((i,j)=>{hg.append('circle').attr('cx',pos[i].x).attr('cy',pos[i].y).attr('r',nodeR).attr('fill',C.red).attr('stroke','#13131e').attr('stroke-width',2.5).attr('opacity',0).transition().delay(j*80).duration(280).attr('opacity',1);});},cycleStart+cEdges.length*380+100);
  }
  svg.append('text').attr('x',12).attr('y',H-12).attr('fill',C.sub).attr('font-size',11).attr('opacity',0).text(`M×A: ${n} estados · ${p.acc.length} aceptantes`).transition().delay(1000).duration(400).attr('opacity',1);
}

// ── navigation ────────────────────────────────────────────────────
let cur=0;
const deck=document.getElementById('deck');

// build slides
SLIDES.forEach((s,i)=>{
  const el=document.createElement('div');
  el.style.cssText='position:absolute;inset:0;display:flex;opacity:0;pointer-events:none;transition:opacity .45s ease';
  el.id=`slide-${i}`;
  el.innerHTML=s.html.trim();
  deck.appendChild(el);
});

function go(n){
  if(n<0||n>=SLIDES.length)return;
  document.getElementById(`slide-${cur}`).style.opacity='0';
  document.getElementById(`slide-${cur}`).style.pointerEvents='none';
  cur=n;
  const el=document.getElementById(`slide-${cur}`);
  el.style.opacity='1';
  el.style.pointerEvents='auto';
  const s=SLIDES[cur];
  if(s.onEnter && (!s._rendered || s.alwaysRender)){
    s._rendered=true;
    // small delay so slide is visible before D3 measures size
    requestAnimationFrame(()=>requestAnimationFrame(()=>s.onEnter(el)));
  }
  updateNav();
}

function updateNav(){
  const pct=((cur/(SLIDES.length-1))*100).toFixed(1);
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-fill2').style.width=pct+'%';
  document.getElementById('slide-label').textContent=SLIDES[cur].label;
  document.getElementById('slide-count').textContent=`${cur+1} / ${SLIDES.length}`;
  document.getElementById('btn-prev').disabled=cur===0;
  document.getElementById('btn-next').disabled=cur===SLIDES.length-1;
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();go(cur+1);}
  if(e.key==='ArrowLeft'){e.preventDefault();go(cur-1);}
});

go(0);
